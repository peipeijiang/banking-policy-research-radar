name: ArXiv Daily Research

on:
  schedule:
    # 每天 UTC 00:30 运行，即北京时间 08:30。
    - cron: '30 0 * * *'

  # 支持手动触发
  workflow_dispatch:
    inputs:
      search_days:
        description: '搜索最近 N 天的论文 (Search recent N days)'
        required: false
        default: '7'

concurrency:
  group: banking-policy-knowledge-write
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << 'ENVEOF'
          CHEAP_LLM__API_KEY=${{ secrets.CHEAP_LLM_API_KEY }}
          CHEAP_LLM__BASE_URL=${{ secrets.CHEAP_LLM_BASE_URL }}
          CHEAP_LLM__MODEL_NAME=${{ secrets.CHEAP_LLM_MODEL_NAME }}
          CHEAP_LLM__TEMPERATURE=${{ secrets.CHEAP_LLM_TEMPERATURE }}
          SMART_LLM__API_KEY=${{ secrets.SMART_LLM_API_KEY }}
          SMART_LLM__BASE_URL=${{ secrets.SMART_LLM_BASE_URL }}
          SMART_LLM__MODEL_NAME=${{ secrets.SMART_LLM_MODEL_NAME }}
          SMART_LLM__TEMPERATURE=${{ secrets.SMART_LLM_TEMPERATURE }}
          OPENALEX_EMAIL=${{ secrets.OPENALEX_EMAIL }}
          OPENALEX_API_KEY=${{ secrets.OPENALEX_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY=${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CORE_API_KEY=${{ secrets.CORE_API_KEY }}
          MINIMAX_API_KEY=${{ secrets.MINIMAX_API_KEY }}
          EMBEDDING_BASE_URL=https://api.minimaxi.com/v1
          EMBEDDING_MODEL=embo-01
          MINERU_API_KEY=${{ secrets.MINERU_API_KEY }}
          MINERU_MODEL_VERSION=vlm
          ENABLE_NOTIFICATIONS=${{ secrets.ENABLE_NOTIFICATIONS }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '587' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_TO=${{ secrets.SMTP_TO }}
          WECHAT_WEBHOOK_URL=${{ secrets.WECHAT_WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL=${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET=${{ secrets.DINGTALK_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}
          GENERIC_WEBHOOK_URL=${{ secrets.GENERIC_WEBHOOK_URL }}
          ENVEOF

      - name: Restore previous data
        uses: actions/cache@v4
        with:
          path: |
            data/history/
            data/keywords/
          key: research-data-${{ github.run_number }}
          restore-keys: |
            research-data-

      - name: Create data directories
        run: |
          mkdir -p data/reports/daily_research/markdown \
                   data/reports/daily_research/html \
                   data/reports/trend_research/markdown \
                   data/reports/trend_research/html \
                   data/reports/keyword_trend/markdown \
                   data/reports/keyword_trend/html \
                   data/history data/keywords data/run \
                   data/reference_pdfs data/downloaded_pdfs logs

      - name: Synchronize paper feedback
        run: python scripts/sync_feedback.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Run research pipeline
        run: python main.py
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ github.token }}
          FEEDBACK_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          FEEDBACK_API_URL: ${{ secrets.FEEDBACK_API_URL }}
          FEEDBACK_SIGNING_SECRET: ${{ secrets.FEEDBACK_SIGNING_SECRET }}

      - name: Commit research knowledge
        if: success()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add knowledge/
          git diff --cached --quiet || git commit -m "chore: update research knowledge"
          git push

      - name: Upload reports as artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-reports-${{ github.run_number }}
          path: |
            data/reports/
            logs/
          retention-days: 30

      - name: Save data for next run
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/history/
            data/keywords/
          key: research-data-${{ github.run_number }}
